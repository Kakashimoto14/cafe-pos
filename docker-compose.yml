version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages:/app/packages
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - ./apps/backend:/var/www/html
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cafe_pos
      POSTGRES_USER: cafe
      POSTGRES_PASSWORD: cafe
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
